name: ESLint

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run eslint
        run: pnpm turbo lint:sarif

      - name: Upload eslint results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: eslint-results
          path: packages/*/eslint.sarif

  codeql:
    needs: eslint
    name: Upload to CodeQL
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - nuxt-module
          - nuxt-playground
          - vue-playground
          - vue-plugin
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download eslint results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: eslint-results
          path: packages

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          category: ${{ matrix.package }}
          sarif_file: packages/${{ matrix.package }}/eslint.sarif
