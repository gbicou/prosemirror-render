name: ESLint

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run eslint
        run: pnpm turbo lint:sarif

      - name: Upload eslint results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: eslint-results
          path: packages/*/eslint.sarif

  codeql:
    needs: eslint
    name: Upload to CodeQL
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - nuxt-module
          - nuxt-playground
          - vue-playground
          - vue-plugin
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download eslint results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: eslint-results
          path: packages

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          category: ${{ matrix.package }}
          sarif_file: packages/${{ matrix.package }}/eslint.sarif
